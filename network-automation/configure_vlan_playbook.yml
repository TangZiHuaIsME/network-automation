---
- name: Configure Router Subinterfaces
  hosts: router_port22
  gather_facts: no
  connection: network_cli
  become: true

  tasks:
    - name: Create the subinterface and set description
      cisco.ios.ios_interfaces:
        config:
          - name: GigabitEthernet1.10
            description: Uplink_For_Data_VLAN_10
            enabled: true
          - name: GigabitEthernet1.20
            description: Uplink_For_Voice_VLAN_20
            enabled: true
        state: merged

    - name: Configure 802.1Q encapsulation and IP addresses
      cisco.ios.ios_l3_interfaces:
        config:
          - name: GigabitEthernet1.10
            ipv4:
              - address: 192.168.10.1/24
          - name: GigabitEthernet1.20
            ipv4:
              - address: 192.168.20.1/24
        state: merged
